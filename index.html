<script>const SUPABASE_URL = "https://slmbgwpnegzvnxkllorh.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsbWJnd3BuZWd6dm54a2xsb3JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxNTMxNDMsImV4cCI6MjA5NzcyOTE0M30.Fs_Th99bpkfAlHEgxPJiL26XGYtIb-R1H-XQ6Qx5tqU";

// Catch ALL unhandled promise rejections and log them visibly
window.addEventListener('unhandledrejection', function(e) {
  console.error('[UNHANDLED REJECTION]', e.reason);
});

// Diagnóstico detalhado de conexão e permissões
(async function testConnection() {
  function showBanner(msg, color, persist) {
    const old = document.getElementById('sb-status');
    if (old) old.remove();
    const div = document.createElement('div');
    div.id = 'sb-status';
    div.style.cssText = 'position:fixed;bottom:10px;right:10px;background:' + color + ';color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;font-family:system-ui;z-index:9999;max-width:360px;word-break:break-all;cursor:pointer;line-height:1.4;';
    div.textContent = msg;
    div.onclick = () => div.remove();
    document.body.appendChild(div);
    if (!persist) setTimeout(() => div.remove(), 5000);
  }

  // 1. Teste GET (SELECT) na tabela kv
  let getOk = false, getStatus = 0, getBody = '';
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/kv?limit=1", {
      headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
    });
    getStatus = res.status;
    getBody = await res.text();
    getOk = res.ok;
  } catch(e) { getBody = 'FETCH ERROR: ' + e.message; }

  if (!getOk) {
    const msg = 'SUPABASE GET FALHOU [' + getStatus + ']: ' + getBody.slice(0, 200);
    console.error('[SUPABASE DIAG]', msg);
    showBanner('✗ ' + msg, '#ef4444', true);
    return;
  }

  // 2. Teste POST (UPSERT) na tabela kv
  let postOk = false, postStatus = 0, postBody = '';
  try {
    const res = await fetch(SUPABASE_URL + "/rest/v1/kv", {
      method: 'POST',
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": "resolution=merge-duplicates,return=minimal"
      },
      body: JSON.stringify({ id: '_diag_test_', value: 'ok_' + Date.now() })
    });
    postStatus = res.status;
    postBody = await res.text();
    postOk = res.ok;
  } catch(e) { postBody = 'FETCH ERROR: ' + e.message; }

  if (!postOk) {
    const msg = 'SUPABASE POST FALHOU [' + postStatus + ']: ' + postBody.slice(0, 200);
    console.error('[SUPABASE DIAG]', msg);
    showBanner('✗ ' + msg, '#ef4444', true);
    return;
  }

  // 3. Tudo OK
  console.log('[SUPABASE] GET OK (' + getStatus + ') | POST OK (' + postStatus + ')');
  showBanner('✓ Supabase OK (GET+POST funcionando)', '#10b981', false);
})();

function showError(msg) {
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;bottom:10px;right:10px;background:#ef4444;color:#fff;padding:8px 14px;border-radius:8px;font-size:12px;font-family:system-ui;z-index:9999;max-width:300px;';
  div.textContent = '✗ ' + msg;
  document.body.appendChild(div);
}

async function sbFetch(method, path, body) {
  const url = SUPABASE_URL + "/rest/v1/" + path;
  const headers = {
    "apikey": SUPABASE_KEY,
    "Authorization": "Bearer " + SUPABASE_KEY,
    "Content-Type": "application/json"
  };
  if (method === "POST") headers["Prefer"] = "resolution=merge-duplicates,return=minimal";
  const res = await fetch(url, {
    method, headers,
    body: body !== undefined ? JSON.stringify(body) : undefined
  });
  const text = await res.text();
  if (!res.ok) throw new Error(method + " " + path + " [" + res.status + "]: " + text);
  return text ? JSON.parse(text) : null;
}

window.storage = {
  async get(key, shared) {
    console.log('[storage.get]', key);
    const rows = await sbFetch("GET", "kv?id=eq." + encodeURIComponent(key) + "&select=value");
    if (!rows || rows.length === 0) throw new Error("not found: " + key);
    console.log('[storage.get OK]', key);
    return { key, value: rows[0].value, shared };
  },

  async set(key, value, shared) {
    console.log('[storage.set START]', key, 'len=' + String(value).length);
    try {
      await sbFetch("POST", "kv", { id: key, value: String(value) });
      console.log('[storage.set OK]', key);
    } catch(e) {
      console.error('[storage.set FAIL]', key, e.message);
      showError('Erro ao salvar: ' + e.message.slice(0, 80));
      throw e;
    }
    return { key, value, shared };
  },

  async delete(key, shared) {
    await sbFetch("DELETE", "kv?id=eq." + encodeURIComponent(key));
    return { key, deleted: true, shared };
  },

  async list(prefix, shared) {
    console.log('[storage.list]', prefix);
    const rows = await sbFetch("GET", "kv?id=like." + encodeURIComponent(prefix + "%") + "&select=id");
    const keys = (rows || []).map(r => r.id);
    console.log('[storage.list OK]', keys.length, 'keys');
    return { keys, prefix, shared };
  }
};
