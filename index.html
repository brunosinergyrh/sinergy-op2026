async function sbFetch(method, path, body) {
  const url = SUPABASE_URL + "/rest/v1/" + path;
  const headers = {
    "apikey": SUPABASE_KEY,
    "Authorization": "Bearer " + SUPABASE_KEY,
    "Content-Type": "application/json"
  };
  if (method === "POST") headers["Prefer"] = "resolution=merge-duplicates,return=minimal";
  const res = await fetch(url, {
    method, headers,
    body: body !== undefined ? JSON.stringify(body) : undefined
  });
  const text = await res.text();
  if (!res.ok) throw new Error(method + " " + path + " [" + res.status + "]: " + text);
  return text ? JSON.parse(text) : null;
}

// O Supabase/PostgREST limita a 1000 linhas por requisicao por padrao.
// Esta funcao pagina automaticamente em blocos de 1000 ate trazer tudo.
// v10: ordenacao explicita e obrigatoria para paginacao por offset ser estavel.
async function _sbFetchAll(basePath, orderCol) {
  const PAGE = 1000;
  const ord = orderCol || "id";
  var all = [], offset = 0;
  while (true) {
    const sep = basePath.indexOf("?") >= 0 ? "&" : "?";
    const page = await sbFetch("GET", basePath + sep + "order=" + ord + ".asc&limit=" + PAGE + "&offset=" + offset);
    const arr = Array.isArray(page) ? page : [];
    all = all.concat(arr);
    if (arr.length < PAGE) break;
    offset += PAGE;
    if (offset > 200000) break; // protecao contra loop infinito
  }
  return all;
}

/* ===== v10: SYNC INCREMENTAL (updated_at) + SOFT-DELETE (deleted_at) =====

   1. Na primeira leitura da sessao, faz UMA carga completa (só linhas vivas) e guarda um cursor
      = maior updated_at visto (relogio do SERVIDOR, gravado por trigger no banco).
   2. Nos ciclos seguintes, pergunta apenas "o que mudou depois do cursor?" — resposta tipica: [].
   3. Exclusoes viram soft-delete (deleted_at preenchido), entao tambem chegam pelo delta.
   4. Redes de seguranca: overlap de 10s no cursor (aplicacao é idempotente, redundancia é
      inofensiva) + full refresh silencioso a cada 10 min + fallback para full refresh se o
      delta falhar.

var _sync = {

  cursor: null,          // maior updated_at (string ISO do servidor) ja aplicado

  lastFull: 0,           // timestamp (ms) do ultimo full refresh

  compat: null,          // null = ainda nao detectado | true = banco SEM migracao v10 (opera como v9) | false = v10 pleno
  DEBOUNCE_MS: 2000,     // list+N gets do mesmo ciclo de 5s custam 1 delta so

  OVERLAP_MS: 10000      // recua o cursor 10s na consulta (protege contra commits tardios)

function _taskRowData(r) { return (r && r.task_data != null) ? r.task_data : (r ? r.data : null); }

function _advanceCursor(updatedAt) {
  if (!updatedAt) return;
  if (!_sync.cursor || Date.parse(updatedAt) > Date.parse(_sync.cursor)) _sync.cursor = updatedAt;

async function _detectCompat() {

    await sbFetch("GET", "tasks?select=deleted_at&limit=1");

  try {
    if (_selfWrites[id] && Date.now() - _selfWrites[id] < 30000) return;
    var prev = prevJson ? JSON.parse(prevJson) : null;
    window.OP2026_CHANGES.push({ kind: kind, eid: eid, id: id, task: task, prev: prev, at: Date.now() });

async function _fullLoad() {

  const fresh = {};
  (rows || []).forEach(function (r) {
    const t = _taskRowData(r);

    const eid = String(r.esteira);
    if (!fresh[eid]) fresh[eid] = {};
    fresh[eid][String(t.id)] = JSON.stringify(t);
    _advanceCursor(r.updated_at);
  });
  _taskCache = fresh;
  _sync.ready = true;
  _sync.lastFull = Date.now();

// Delta: traz apenas linhas alteradas apos o cursor (inclui soft-deletadas) e aplica no cache.
async function _deltaPull() {

    const eid = String(r.esteira);
