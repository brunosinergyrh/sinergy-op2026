// Storage polyfill for standalone use (in-memory)
window.storage = (() => {
  const store = {};
  const sharedStore = {};
  return {
    async get(key, shared=false) {
      const s = shared ? sharedStore : store;
      if (key in s) return { key, value: s[key], shared };
      throw new Error('Key not found: ' + key);
    },
    async set(key, value, shared=false) {
      const s = shared ? sharedStore : store;
      s[key] = value;
      return { key, value, shared };
    },
    async delete(key, shared=false) {
      const s = shared ? sharedStore : store;
      delete s[key];
      return { key, deleted: true, shared };
    },
    async list(prefix='', shared=false) {
      const s = shared ? sharedStore : store;
      const keys = Object.keys(s).filter(k => k.startsWith(prefix));
      return { keys, prefix, shared };
    }
  };
})();

const norm=s=>s?.toString().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim()??"";

const migrateTask=t=>{let n={...t};if(!n.code)n.code=genCode();if(!Array.isArray(n.responsibles))n.responsibles=t.responsible?[t.responsible]:[];return n;};

const userScope=(u,groups)=>{if(!u)return null;const g=groupOf(u,groups);if(g?.fullAccess)return"all";if(g?.isGerente)return u.id;return u.gerenteId||"__none__";};
const mapEsteira=(val,ests)=>{const n=norm(val);if(!n||!ests?.length)return null;for(const e of ests){if(norm(e.label)===n)return e.id;}for(const e of ests){const ln=norm(e.label);if(ln&&(n.includes(ln)||ln.includes(n)))return e.id;}if(n.includes("encargo")||n.includes("contab")){const f=ests.find(e=>norm(e.label).includes("folha")||norm(e.label).includes("encargo"));if(f)return f.id;}return null;};
const mapPri=val=>{const n=norm(val??"");if(n.includes("alt")||n==="1")return"alta";if(n.includes("baix")||n==="3")return"baixa";return"media";};
const splitNames=val=>String(val||"").split(/[,;\/]+/).map(s=>s.trim()).filter(Boolean);
const detectCol=(hdrs,kws)=>{for(const h of hdrs){const n=norm(h);if(kws.some(k=>n.includes(k)))return h;}return"";};
const toDateStr=val=>{if(!val)return"";if(val instanceof Date){if(isNaN(val))return"";return`${val.getFullYear()}-${String(val.getMonth()+1).padStart(2,"0")}-${String(val.getDate()).padStart(2,"0")}`;}if(typeof val==="number"){const d=new Date(Math.round((val-25569)*86400*1000));return isNaN(d)?"":`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;}const s=String(val).trim();const m=s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);if(m)return`${m[3]}-${m[2].padStart(2,"0")}-${m[1].padStart(2,"0")}`;const d=new Date(s);return isNaN(d)?"":d.toISOString().slice(0,10);};
const toMonthStr=val=>{if(!val)return"";const s=String(val).trim();if(/^\d{4}-\d{2}$/.test(s))return s;const m1=s.match(/^(\d{1,2})\/(\d{4})$/);if(m1)return`${m1[2]}-${m1[1].padStart(2,"0")}`;const mn={jan:"01",fev:"02",mar:"03",abr:"04",mai:"05",jun:"06",jul:"07",ago:"08",set:"09",out:"10",nov:"11",dez:"12"};const m2=s.toLowerCase().match(/^([a-z]+)[\/\-](\d{4})$/);if(m2&&mn[m2[1]])return`${m2[2]}-${mn[m2[1]]}`;return s;};
const fmtDate=d=>d?new Date(d+"T12:00:00").toLocaleDateString("pt-BR"):null;
const fmtMonth=m=>{if(!m)return null;const[y,mo]=m.split("-");if(!y||!mo)return m;return`${MONTHS[parseInt(mo)-1]}/${y}`;};
const fmtDT=iso=>{if(!iso)return"";const d=new Date(iso);return d.toLocaleDateString("pt-BR")+" "+d.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});};
const getStatusGroup=t=>{if(t.status==="concluida")return"feito";if(!t.deadline)return"planejada";const today=new Date();today.setHours(0,0,0,0);const diff=Math.floor((new Date(t.deadline+"T00:00:00")-today)/(86400*1000));if(diff<0)return"atraso";if(diff<=1)return"andamento";return"planejada";};
const daysLeft=da=>da?Math.max(0,Math.ceil((TRASH_MS-(Date.now()-new Date(da).getTime()))/(86400*1000))):TRASH_DAYS;
const makeSortFn=(field,dir)=>{const m=dir==="asc"?1:-1;const pO={alta:0,media:1,baixa:2};return(a,b)=>{if(field==="priority")return(pO[a.priority]-pO[b.priority])*m;const av=(a[field]??"").toString().toLowerCase();const bv=(b[field]??"").toString().toLowerCase();if(av===bv)return 0;if(!av)return 1;if(!bv)return-1;return(av<bv?-1:1)*m;};};

/* ── AutoInput ── */
const AutoInput=memo(function AutoInput({value,onChange,suggestions,placeholder,disabled,T,onEnter}){
  const[open,setOpen]=useState(false);const v=value||"";
  const list=(suggestions||[]).filter(s=>s&&norm(s).includes(norm(v))&&norm(s)!==norm(v)).slice(0,8);
  const I=mkI(T);
  return(<div style={{position:"relative"}}><input value={v} disabled={disabled} onChange={e=>{onChange(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),130)} placeholder={placeholder} style={{...I,opacity:disabled?0.6:1}} onKeyDown={e=>{if(e.key==="Enter"){setOpen(false);onEnter&&onEnter();}if(e.key==="Escape")setOpen(false);}}/>{open&&!disabled&&list.length>0&&(<div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:40,background:T.surface,border:`1px solid ${T.inpB}`,borderRadius:8,boxShadow:"0 10px 28px rgba(0,0,0,0.3)",maxHeight:190,overflowY:"auto"}}>{list.map((s,i)=>(<div key={i} onMouseDown={()=>{onChange(s);setOpen(false);}} style={{padding:"7px 11px",fontSize:13,color:T.text,cursor:"pointer",borderBottom:i<list.length-1?`1px solid ${T.borderL}`:"none"}}>{s}</div>))}</div>)}</div>);
});

/* ── MultiAutoInput ── */
const MultiAutoInput=memo(function MultiAutoInput({values,onChange,suggestions,placeholder,T}){
  const[txt,setTxt]=useState("");const[open,setOpen]=useState(false);const vals=values||[];
  const list=(suggestions||[]).filter(s=>s&&!vals.some(v=>norm(v)===norm(s))&&norm(s).includes(norm(txt))).slice(0,8);
  const add=v=>{const n=(v||"").trim();if(!n)return;if(!vals.some(x=>norm(x)===norm(n)))onChange([...vals,n]);setTxt("");setOpen(false);};
  const remove=i=>onChange(vals.filter((_,j)=>j!==i));
  const I=mkI(T);
  return(<div style={{position:"relative"}}><div style={{...I,padding:"4px 6px",minHeight:34,display:"flex",flexWrap:"wrap",gap:4,alignItems:"center"}}>{vals.map((v,i)=>(<span key={i} style={{display:"inline-flex",alignItems:"center",gap:4,background:"rgba(99,102,241,0.15)",color:"#818cf8",borderRadius:6,padding:"2px 7px",fontSize:12,fontWeight:500}}>{v}<X size={11} style={{cursor:"pointer"}} onClick={()=>remove(i)}/></span>))}<input value={txt} onChange={e=>{setTxt(e.target.value);setOpen(true);}} onFocus={()=>setOpen(true)} onBlur={()=>setTimeout(()=>setOpen(false),130)} onKeyDown={e=>{if(e.key==="Enter"){e.preventDefault();add(txt);}if(e.key==="Backspace"&&!txt&&vals.length)remove(vals.length-1);}} placeholder={vals.length?"":placeholder} style={{flex:1,minWidth:70,border:"none",outline:"none",background:"transparent",color:T.text,fontSize:13,fontFamily:"inherit",padding:"3px 2px"}}/></div>{open&&list.length>0&&(<div style={{position:"absolute",top:"calc(100% + 4px)",left:0,right:0,zIndex:40,background:T.surface,border:`1px solid ${T.inpB}`,borderRadius:8,boxShadow:"0 10px 28px rgba(0,0,0,0.3)",maxHeight:190,overflowY:"auto"}}>{list.map((s,i)=>(<div key={i} onMouseDown={()=>add(s)} style={{padding:"7px 11px",fontSize:13,color:T.text,cursor:"pointer",borderBottom:i<list.length-1?`1px solid ${T.borderL}`:"none"}}>{s}</div>))}</div>)}</div>);

const AdminPanel=memo(function AdminPanel({users,groups,session,onSaveUsers,onLog,onClose,T}){
  const[nu,setNu]=useState({name:"",pin:"",groupId:"analista",gerenteId:""});
  const[rId,setRId]=useState(null);const[rPin,setRPin]=useState("");
  const[eId,setEId]=useState(null);const[eName,setEName]=useState("");const[eGrp,setEGrp]=useState("");const[eLot,setELot]=useState("");
  const I=mkI(T);
  const gerentes=users.filter(u=>isGerenteUser(u,groups));
  const lotNeeded=gid=>{const g=groups.find(x=>x.id===gid);return g&&!g.fullAccess&&!g.isGerente;};
  const lotLabel=u=>{const g=groups.find(x=>x.id===u.groupId);if(g?.fullAccess)return"Todos";if(g?.isGerente)return"Propria lotacao";const ge=users.find(x=>x.id===u.gerenteId);return ge?ge.name:"-";};

        </div>
        <div style={{display:"flex",gap:2,overflowX:"auto",alignItems:"center"}}>
          {has("view_workspace")&&<button onClick={()=>switchTab("workspace")} style={{padding:"9px 15px",borderRadius:"8px 8px 0 0",border:"none",cursor:"pointer",fontSize:12.5,fontWeight:isWS?600:500,whiteSpace:"nowrap",background:isWS?"rgba(129,140,248,0.12)":"transparent",color:isWS?"#818cf8":T.textM,borderBottom:`2px solid ${isWS?"#818cf8":"transparent"}`}}>Minha Area</button>}
          {has("view_workspace")&&<div style={{width:1,background:T.borderL,alignSelf:"stretch",margin:"0 6px"}}/>}
          {sortedEsts.map(e=>{const pending=(tasks[e.id]||[]).filter(t=>visTask(t)&&t.status==="pendente").length;const active=tab===e.id;return(<button key={e.id} onClick={()=>switchTab(e.id)} style={{padding:"9px 15px",borderRadius:"8px 8px 0 0",border:"none",cursor:"pointer",fontSize:12.5,fontWeight:active?600:400,whiteSpace:"nowrap",background:active?T.tabA:"transparent",color:active?e.color:T.textM,borderBottom:`2px solid ${active?e.color:"transparent"}`,display:"flex",alignItems:"center",gap:6}}>{e.label}{pending>0&&<span style={{background:e.color+"33",color:e.color,borderRadius:10,fontSize:10,padding:"1px 6px",fontWeight:700}}>{pending}</span>}</button>);})}
        </div>
      </div>

      {/* ── CONTENT ── */}
      <div style={{padding:"20px 28px"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:240}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}><span style={{fontSize:12,color:T.textM}}>{filtered.length}/{cur.length} tarefa{cur.length!==1?"s":""}</span><span style={{fontSize:12,fontWeight:600,color:activeE.color}}>{done}/{cur.length} - {pct}%</span></div><div style={{height:5,borderRadius:99,background:T.progBg}}><div style={{height:"100%",width:`${pct}%`,borderRadius:99,background:activeE.color,transition:"width 0.5s ease"}}/></div></div>
          <button onClick={()=>setShowFilters(f=>!f)} style={{...mkB(showFilters?activeE.color:null,!showFilters,T),padding:"6px 12px",fontSize:12}}><Filter size={13}/>Filtros{activeFC>0?` (${activeFC})`:""}</button>
          <select value={sortIdx} onChange={ev=>changeSort(parseInt(ev.target.value))} style={{...I,width:"auto",padding:"6px 10px",fontSize:12,background:T.selBg,colorScheme:T.cs}}>{SORT_OPTIONS.map((o,i)=><option key={i} value={i}>{o.label}</option>)}</select>
          {has("bulk_ops")&&!isWS&&<button onClick={()=>{setBulkMode(b=>!b);setBulkSel(new Set());setBulkConfirm(false);setBulkEditOpen(false);}} style={{...mkB(bulkMode?"#ef4444":null,!bulkMode,T),padding:"6px 12px",fontSize:12}}>{bulkMode?"Cancelar":"Selecionar"}</button>}
          {!isWS&&!bulkMode&&has("create_task")&&<button onClick={()=>{cancelForm();setShowForm(true);}} style={{...mkB(activeE.color,false,T),fontSize:12,padding:"6px 13px"}}><Plus size={14}/>Nova tarefa</button>}
        </div>

        {bulkMode&&(<div style={{marginBottom:14,padding:"10px 14px",borderRadius:10,border:"1px solid rgba(99,102,241,0.3)",background:"rgba(99,102,241,0.08)"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
            <span style={{fontSize:13,fontWeight:600,color:"#818cf8"}}>{bulkSel.size} selecionada{bulkSel.size!==1?"s":""}</span>
            <button onClick={()=>setBulkSel(new Set(filtered.map(t=>t.id)))} style={{...mkB(null,true,T),fontSize:11,padding:"4px 10px"}}>Todas ({filtered.length})</button>
            <button onClick={()=>setBulkSel(new Set())} disabled={bulkSel.size===0} style={{...mkB(null,true,T),fontSize:11,padding:"4px 10px",opacity:bulkSel.size===0?0.5:1}}>Limpar</button>
            <div style={{flex:1}}/>
            <button onClick={()=>{setBulkEditOpen(o=>!o);setBulkConfirm(false);}} disabled={bulkSel.size===0} style={{padding:"6px 14px",borderRadius:8,border:"1px solid rgba(99,102,241,0.4)",background:bulkEditOpen?"rgba(99,102,241,0.2)":"rgba(99,102,241,0.1)",color:"#818cf8",fontSize:12.5,fontWeight:600,cursor:"pointer",opacity:bulkSel.size===0?0.4:1,display:"inline-flex",alignItems:"center",gap:6}}><Pencil size={13}/>Editar em lote</button>
            {has("delete_task")&&(bulkConfirm?<><span style={{fontSize:12,color:"#ef4444",fontWeight:500}}>Confirmar exclusao?</span><button onClick={()=>setBulkConfirm(false)} style={{...mkB(null,true,T),fontSize:11,padding:"4px 12px"}}>Cancelar</button><button onClick={bulkDelete} style={{padding:"4px 14px",borderRadius:8,border:"none",background:"#ef4444",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"}}>Excluir</button></>:<button onClick={()=>{setBulkConfirm(true);setBulkEditOpen(false);}} disabled={bulkSel.size===0} style={{padding:"6px 14px",borderRadius:8,border:"1px solid rgba(239,68,68,0.4)",background:"rgba(239,68,68,0.1)",color:"#ef4444",fontSize:12.5,fontWeight:600,cursor:"pointer",opacity:bulkSel.size===0?0.4:1,display:"inline-flex",alignItems:"center",gap:6}}><Trash2 size={13}/>Excluir selecionadas</button>)}
          </div>
          {bulkEditOpen&&bulkSel.size>0&&(<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid rgba(99,102,241,0.2)",display:"grid",gridTemplateColumns:"1fr 1.5fr auto auto",gap:10,alignItems:"end"}}>
            <div><div style={{fontSize:11,color:T.textM,marginBottom:4}}>Campo</div><select value={bulkF} onChange={ev=>{setBulkF(ev.target.value);setBulkV("");}} style={{...I,background:T.selBg,colorScheme:T.cs,padding:"6px 10px"}}><option value="">Selecione...</option>{BULK_FIELDS.map(f=><option key={f.key} value={f.key}>{f.label}</option>)}</select></div>
            <div><div style={{fontSize:11,color:T.textM,marginBottom:4}}>Valor</div>{bulkValueInput}</div>
            <button onClick={()=>{setBulkEditOpen(false);setBulkF("");setBulkV("");}} style={{...mkB(null,true,T),padding:"6px 12px",fontSize:11.5}}>Cancelar</button>
            <button onClick={bulkEdit} disabled={!bulkF||((bulkF==="esteira"||bulkF==="gerente")&&!bulkV)} style={{...mkB("#10b981",false,T),padding:"6px 14px",fontSize:11.5,opacity:(!bulkF||((bulkF==="esteira"||bulkF==="gerente")&&!bulkV))?0.4:1}}>Aplicar</button>
          </div>)}
        </div>)}

        {showFilters&&(<div style={{marginBottom:16,padding:16,borderRadius:10,border:`1px solid ${T.panelB}`,background:T.panelBg}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:10}}>
            {[{key:"status",label:"Status",opts:[["all","Todos"],["pendente","Pendente"],["concluida","Concluida"]]},{key:"priority",label:"Prioridade",opts:[["all","Todas"],["alta","Alta"],["media","Media"],["baixa","Baixa"]]},{key:"responsible",label:"Analista",dyn:true},{key:"coordenador",label:"Coordenador",dyn:true},{key:"gerente",label:"Gerente",dyn:true},{key:"cliente",label:"Cliente",dyn:true},{key:"processo",label:"Processo",dyn:true},{key:"mes",label:"Mes",dyn:true,fmt:fmtMonth}].map(fc=>(
              <div key={fc.key}><div style={{fontSize:10,fontWeight:600,color:filters[fc.key]!=="all"?activeE.color:T.textD,marginBottom:4,textTransform:"uppercase",letterSpacing:"0.07em"}}>{fc.label}{filters[fc.key]!=="all"&&" *"}</div><select value={filters[fc.key]} onChange={ev=>setF(fc.key,ev.target.value)} style={{...I,background:T.selBg,colorScheme:T.cs,padding:"6px 10px",fontSize:12,border:`1px solid ${filters[fc.key]!=="all"?activeE.color+"88":T.inpB}`}}><option value="all">Todos</option>{fc.dyn?(fc.key==="responsible"?respOpts:uVals(fc.key)).map(v=><option key={v} value={v}>{fc.fmt?fc.fmt(v):v}</option>):fc.opts?.slice(1).map(([v,l])=><option key={v} value={v}>{l}</option>)}</select></div>
            ))}
          </div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}><span style={{fontSize:11,color:T.textM}}>Filtros salvos no seu usuario.</span><button onClick={clearFilters} style={{...mkB(null,true,T),fontSize:11,padding:"4px 12px",color:activeFC>0?"#ef4444":T.textM,borderColor:activeFC>0?"rgba(239,68,68,0.3)":T.border}}>Limpar filtros</button></div>
        </div>)}

        {showForm&&!isWS&&has("create_task")&&(<div style={{marginBottom:16,padding:18,borderRadius:12,border:`1px solid ${T.panelB}`,background:T.formBg,position:"relative",zIndex:5}}>
          <div style={{display:"grid",gridTemplateColumns:"2fr 1.2fr 1fr 1fr",gap:10,marginBottom:10}}>
            <div><div style={{fontSize:11,color:T.textM,marginBottom:4}}>Tarefa *</div><AutoInput value={form.title} onChange={v=>setForm(f=>({...f,title:v}))} suggestions={fTitle} placeholder="Descricao" T={T} onEnter={addTask}/></div>
            <div><div style={{fontSize:11,color:T.textM,marginBottom:4}}>Analista responsavel</div><MultiAutoInput values={form.responsibles} onChange={v=>setForm(f=>({...f,responsibles:v}))} suggestions={memberNames} placeholder="Adicionar nome" T={T}/></div>
            <div><div style={{fontSize:11,color:T.textM,marginBottom:4}}>Coordenador</div><AutoInput value={form.coordenador} onChange={v=>setForm(f=>({...f,coordenador:v}))} suggestions={coordNames} placeholder="Nome" T={T}/></div>
            <div><div style={{fontSize:11,color:T.textM,marginBottom:4}}>Gerente / Lotacao</div>{scope==="all"?<AutoInput value={form.gerente} onChange={v=>setForm(f=>({...f,gerente:v}))} suggestions={gerenteNames} placeholder="Gerente" T={T}/>:<input disabled value={myGerenteName} style={{...I,opacity:0.6}}/>}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr 1fr",gap:10,marginBottom:10}}>
            <div><div style={{fontSize:11,color:T.textM,marginBottom:4}}>Cliente</div><AutoInput value={form.cliente} onChange={v=>setForm(f=>({...f,cliente:v}))} suggestions={fCliente} placeholder="Empresa" T={T}/></div>
            <div><div style={{fontSize:11,color:T.textM,marginBottom:4}}>Processo</div><AutoInput value={form.processo} onChange={v=>setForm(f=>({...f,processo:v}))} suggestions={fProcesso} placeholder="..." T={T}/></div>
            <div><div style={{fontSize:11,color:T.textM,marginBottom:4}}>Mes</div><input type="month" value={form.mes} onChange={ev=>setForm(f=>({...f,mes:ev.target.value}))} style={{...I,colorScheme:T.cs}}/></div>
            <div><div style={{fontSize:11,color:T.textM,marginBottom:4}}>Prazo</div><input type="date" value={form.deadline} onChange={ev=>setForm(f=>({...f,deadline:ev.target.value}))} style={{...I,colorScheme:T.cs}}/></div>
            <div><div style={{fontSize:11,color:T.textM,marginBottom:4}}>Prioridade</div><select value={form.priority} onChange={ev=>setForm(f=>({...f,priority:ev.target.value}))} style={{...I,background:T.selBg,colorScheme:T.cs}}><option value="alta">Alta</option><option value="media">Media</option><option value="baixa">Baixa</option></select></div>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}><button onClick={cancelForm} style={mkB(null,true,T)}>Cancelar</button><button onClick={addTask} style={mkB(activeE.color,false,T)}>{editId?"Salvar":"Adicionar"}</button></div>
        </div>)}

        {filtered.length===0?(<div style={{textAlign:"center",padding:"48px 0",color:T.textD}}><div style={{display:"flex",justifyContent:"center",marginBottom:10,opacity:0.35}}><Inbox size={34}/></div><div style={{fontSize:13}}>{activeFC>0?"Nenhuma tarefa com esses filtros":isWS?"Sem tarefas atribuidas":"Nenhuma tarefa"}</div>{activeFC>0&&<button onClick={clearFilters} style={{marginTop:10,fontSize:12,color:activeE.color,background:"transparent",border:"none",cursor:"pointer",textDecoration:"underline"}}>Limpar filtros</button>}</div>):(
          <div>
            {Object.entries(STATUS_GROUPS).sort((a,b)=>a[1].order-b[1].order).map(([key,g])=>{
              const list=grouped[key];if(!list||list.length===0)return null;
              const isCollapsed=!!collapsedGroups[key];
              return(<div key={key} style={{marginBottom:16}}>
                <div onClick={()=>setCollapsedGroups(p=>({...p,[key]:!p[key]}))} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 4px",marginBottom:isCollapsed?0:8,borderBottom:`1px solid ${T.borderL}`,cursor:"pointer",userSelect:"none"}}>
                  <span style={{fontSize:12,fontWeight:700,color:g.color,textTransform:"uppercase",letterSpacing:"0.08em"}}>{g.label}</span>
                  <span style={{fontSize:11,color:T.textM,marginLeft:4}}>{list.length} tarefa{list.length!==1?"s":""}</span>
                  <div style={{flex:1,height:1,background:g.color,opacity:0.15,marginLeft:6}}/>
                  {isCollapsed?<ChevronDown size={14} color={T.textD}/>:<ChevronUp size={14} color={T.textD}/>}
                </div>
                {!isCollapsed&&<div style={{display:"flex",flexDirection:"column",gap:6}}>
                  {list.map(task=>(
                    <TaskCard key={task.id} task={task} esteiras={esteiras} activeColor={activeE.color} showEst={isWS} canDelete={has("delete_task")&&!bulkMode} canEdit={canTaskEdit(task)} canComplete={has("complete_task")} bulkMode={bulkMode} selected={bulkSel.has(task.id)} T={T} onToggle={toggle} onSelect={toggleSel} onEdit={startEdit} onDelete={softDelete}/>
                  ))}
                </div>}
              </div>);
            })}
          </div>
        )}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
